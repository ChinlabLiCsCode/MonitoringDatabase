[agent]
  interval = "5s"
  flush_interval = "5s"
  metric_batch_size = 5000
  metric_buffer_limit = 50000
  precision = "1ms"

# ── Input: receive InfluxDB v2 line-protocol writes from the Python sensor code ──
[[inputs.influxdb_v2_listener]]
  service_address = ":8087"
  # No token auth — this port should only be reachable from localhost.
  # The bucket name from the ?bucket= query param is stored as a tag so the
  # InfluxDB output below can route each write to the correct bucket.
  bucket_tag = "bucket"

# ── Processor 1: clone each metric for Grafana Cloud routing ─────────────────
# The clone gets a prom_target=cloud tag so outputs can route it separately
# from the original, which goes to local InfluxDB unchanged.
[[processors.clone]]
  [processors.clone.tags]
    prom_target = "cloud"

# ── Processor 2: sanitize names on cloud-bound clones only ───────────────────
# Prometheus metric names must match [a-zA-Z_][a-zA-Z0-9_]*.
# Replaces spaces, parens, percent signs, etc. with underscores.
[[processors.regex]]
  [processors.regex.tagpass]
    prom_target = ["cloud"]
  [[processors.regex.metric_rename]]
    pattern = "[^a-zA-Z0-9_]+"
    replacement = "_"
  [[processors.regex.field_rename]]
    pattern = "[^a-zA-Z0-9_]+"
    replacement = "_"

# ── Output 1: local InfluxDB — originals only, names untouched ───────────────
[[outputs.influxdb_v2]]
  urls = ["${INFLUXDB_URL}"]
  token = "${INFLUXDB_TOKEN}"
  organization = "${INFLUXDB_ORG}"
  bucket_tag = "bucket"
  exclude_bucket_tag = true
  tagexclude = ["host"]
  [outputs.influxdb_v2.tagdrop]
    prom_target = ["cloud"]

# ── Output 2: Grafana Cloud — sanitized clones only ──────────────────────────
# After sanitization example: "Temperature (C)" → "Temperature__C_"
# Tags (Device_Class, Serial_Number, Parameter) become Prometheus labels.
[[outputs.http]]
  url = "${GRAFANA_CLOUD_PROM_URL}"
  method = "POST"
  timeout = "10s"
  username = "${GRAFANA_CLOUD_PROM_USER}"
  password = "${GRAFANA_CLOUD_PROM_KEY}"
  data_format = "prometheusremotewrite"
  namedrop = ["queue_length", "test"]
  tagexclude = ["prom_target"]
  [outputs.http.tagpass]
    prom_target = ["cloud"]
  [outputs.http.headers]
    Content-Type = "application/x-protobuf"
    Content-Encoding = "snappy"
    X-Prometheus-Remote-Write-Version = "0.1.0"
